services:
  backend:
    ports: []

  frontend:
    build:
      target: builder
    # В проде фронт — одноразовая build-задача: собрал dist в volume и вышел.
    # restart:always из базового compose рестартил бы её вечно (и Caddy
    # бесконечно ждал бы service_completed_successfully) — поэтому "no".
    restart: "no"
    ports: []
    volumes:
      - frontend_dist:/app/dist
    command: ["sh", "-c", "echo done"]

  caddy:
    image: caddy:2-alpine
    container_name: queue_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend_dist:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_completed_successfully
      backend:
        condition: service_started

volumes:
  caddy_data:
  caddy_config:
  frontend_dist:
