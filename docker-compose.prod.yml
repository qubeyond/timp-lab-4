services:
  postgres:
    image: postgres:16-alpine
    container_name: queue_postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: queue_redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: queue_backend
    restart: always
    env_file:
      - .env
      - ./backend/.env
    depends_on:
      - redis
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: queue_frontend
    restart: "no"
    volumes:
      - frontend_dist:/app/dist
    command: ["sh", "-c", "rm -rf /app/dist/* && cp -r /dist-build/. /app/dist/ && echo done"]
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    container_name: queue_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend_dist:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_completed_successfully
      backend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  frontend_dist:
